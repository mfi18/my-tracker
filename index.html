<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Expense Tracker Pro | iOS 26.3</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

    <style>
        :root {
            --ios-blue: #007AFF;
            --ios-green: #30D158;
            --ios-red: #FF453A;
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.2);
            --glass-blur: blur(40px) saturate(210%);
            --text-main: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.5);
            /* iOS Spring Timing */
            --ios-spring: cubic-bezier(0.32, 2.1, 0.35, 0.85);
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif; 
            letter-spacing: -0.015em; 
            user-select: none; /* Prevents text selection during long press */
        }
        
        body {
            background-color: #000;
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(225,39%,22%,1) 0, transparent 50%), 
                radial-gradient(at 50% 100%, hsla(339,49%,18%,1) 0, transparent 50%);
            background-attachment: fixed;
            color: var(--text-main);
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            overflow: hidden;
        }

        #app-container { width: 100%; max-width: 440px; padding: 20px; display: flex; flex-direction: column; position: relative; }

        /* --- THE GLASS SYSTEM --- */
        .glass-card { 
            background: var(--glass-bg); 
            backdrop-filter: var(--glass-blur); 
            -webkit-backdrop-filter: var(--glass-blur); 
            border: 0.5px solid var(--glass-border); 
            border-radius: 32px; 
            padding: 25px; 
            margin-bottom: 20px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.3); 
        }

        /* --- HAPTIC BUTTON ANIMATION --- */
        .pill-btn { 
            background: var(--glass-bg); 
            backdrop-filter: var(--glass-blur); 
            -webkit-backdrop-filter: var(--glass-blur); 
            border: 0.5px solid var(--glass-border); 
            border-radius: 22px; 
            padding: 18px; 
            color: white; 
            font-weight: 600; 
            font-size: 17px; 
            cursor: pointer; 
            transition: transform 0.3s var(--ios-spring), box-shadow 0.3s ease, background 0.3s ease;
            width: 100%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 12px; 
            margin-bottom: 14px;
            position: relative;
            outline: none;
        }

        /* Immediate response on touch */
        .pill-btn:active {
            transform: scale(0.92);
            background: rgba(255,255,255,0.15);
        }

        /* The "Haptic Pop" effect triggered by JS */
        .pill-btn.haptic-pop {
            transform: scale(1.08);
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.15), 0 10px 40px rgba(0,0,0,0.4);
            background: rgba(255,255,255,0.2);
            z-index: 10;
        }

        .btn-add { background: rgba(48, 209, 88, 0.2); border-color: rgba(48, 209, 88, 0.4); color: var(--ios-green); }
        .btn-remove { background: rgba(255, 69, 58, 0.2); border-color: rgba(255, 69, 58, 0.4); color: var(--ios-red); }
        .btn-blue { background: var(--ios-blue); border: none; font-weight: 700; }
        .btn-back { width: auto; padding: 10px 20px; border-radius: 14px; font-size: 13px; align-self: flex-start; margin-bottom: 20px; background: rgba(255,255,255,0.1); }

        .wallet-amt { font-size: 48px; font-weight: 800; letter-spacing: -2px; margin: 8px 0; }
        .month-label { color: var(--text-dim); font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; }

        input { width: 100%; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--glass-border); border-radius: 20px; padding: 18px; color: white; font-size: 20px; outline: none; margin-top: 10px; text-align: center; }

        .view { display: none; flex-direction: column; height: 100%; animation: iosOpen 0.5s var(--ios-spring); }
        .view.active { display: flex; }

        @keyframes iosOpen { from { opacity: 0; transform: scale(0.9) translateY(30px); filter: blur(15px); } to { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); } }

        #history-list { flex: 1; overflow-y: auto; padding-bottom: 40px; }
        .history-item { background: var(--glass-bg); border: 0.5px solid var(--glass-border); border-radius: 24px; padding: 20px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }

        .row { display: flex; gap: 15px; }
        .half { flex: 1; }
    </style>
</head>
<body>

<div id="app-container">
    <div style="text-align: center; margin-top: 10px;">
        <img src="favicon-96x96.png" style="width: 60px; filter: drop-shadow(0 0 15px rgba(0, 122, 255, 0.4));">
    </div>

    <!-- HEADER -->
    <div id="app-header">
        <div class="glass-card" style="text-align: center; margin-top: 15px;">
            <div id="display-month" class="month-label">---</div>
            <div id="display-wallet" class="wallet-amt">PKR 0</div>
            <div style="display: flex; justify-content: space-around; margin-top: 20px; border-top: 0.5px solid var(--glass-border); padding-top: 20px;">
                <div>
                    <div style="font-size: 10px; color: var(--text-dim);">INCOME</div>
                    <div id="stat-inc" style="color: var(--ios-green); font-weight: 800;">+0</div>
                </div>
                <div style="width: 0.5px; background: var(--glass-border);"></div>
                <div>
                    <div style="font-size: 10px; color: var(--text-dim);">EXPENSE</div>
                    <div id="stat-exp" style="color: var(--ios-red); font-weight: 800;">-0</div>
                </div>
            </div>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div id="view-dashboard" class="view active">
        <div class="row">
            <div class="half"><button class="pill-btn btn-add haptic" onclick="showView('incoming')">＋ ADD</button></div>
            <div class="half"><button class="pill-btn btn-remove haptic" onclick="showView('outgoing')">－ REMOVE</button></div>
        </div>
        <button class="pill-btn haptic" onclick="showView('history')">📜 History & Records</button>
    </div>

    <!-- INCOME MENU -->
    <div id="view-incoming" class="view">
        <button class="pill-btn btn-back" onclick="showView('dashboard')">← Dashboard</button>
        <button class="pill-btn haptic" onclick="prepEntry('Income', 'Pocketmoney', 'From who?')">💰 Pocketmoney</button>
        <button class="pill-btn haptic" onclick="prepEntry('Income', 'Debt Back', 'Who paid?')">🔄 Debt Back</button>
        <button class="pill-btn haptic" onclick="prepEntry('Income', 'Other', 'Source?')">✨ Other</button>
    </div>

    <!-- EXPENSE MENU -->
    <div id="view-outgoing" class="view">
        <button class="pill-btn btn-back" onclick="showView('dashboard')">← Dashboard</button>
        <button class="pill-btn haptic" onclick="showView('food')">🍔 Food & Drinks</button>
        <button class="pill-btn haptic" onclick="prepEntry('Expense', 'Cab', 'To where?')">🚕 Cab</button>
        <button class="pill-btn haptic" onclick="prepEntry('Expense', 'Rent', 'Which month?')">🏠 Rent</button>
        <button class="pill-btn haptic" onclick="prepEntry('Expense', 'Other', 'Note?')">🛒 Other</button>
    </div>

    <!-- FOOD MENU -->
    <div id="view-food" class="view">
        <button class="pill-btn btn-back" onclick="showView('outgoing')">← Back</button>
        <div id="food-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;"></div>
    </div>

    <!-- ENTRY FORM -->
    <div id="view-entry" class="view">
        <button class="pill-btn btn-back" onclick="showView('dashboard')">✕ Cancel</button>
        <div class="glass-card">
            <h2 id="entry-title" style="margin: 0; text-align: center;">Entry</h2>
            <input type="number" id="input-amount" placeholder="0.00" inputmode="decimal">
            <input type="text" id="input-desc" placeholder="Remarks...">
            <button class="pill-btn btn-blue haptic" style="margin-top: 25px;" onclick="saveEntry()">Save</button>
        </div>
    </div>

    <!-- HISTORY -->
    <div id="view-history" class="view">
        <button class="pill-btn btn-back" onclick="showView('dashboard')">← Back</button>
        <div class="glass-card" style="padding: 15px; margin-bottom: 15px; display: flex; gap: 10px;">
            <button class="pill-btn haptic" style="font-size: 11px; padding: 10px; margin:0;" onclick="exportPreviousMonth()">PDF Report</button>
            <button class="pill-btn haptic" style="font-size: 11px; padding: 10px; margin:0;" onclick="backupJSON()">💾 Backup</button>
        </div>
        <div id="history-list"></div>
    </div>

</div>

<script>
    let transactions = JSON.parse(localStorage.getItem('ios_haptic_logs')) || [];
    let activeCat = "", activeSub = "", activeType = "";

    // --- HAPTIC TOUCH SYSTEM ---
    document.addEventListener('DOMContentLoaded', () => {
        const hapticBtns = document.querySelectorAll('.haptic');
        
        hapticBtns.forEach(btn => {
            let timer;
            
            btn.addEventListener('touchstart', (e) => {
                // Initial press shrink is handled by CSS :active
                timer = setTimeout(() => {
                    btn.classList.add('haptic-pop');
                    if (navigator.vibrate) navigator.vibrate(15); // Tiny vibration
                }, 400); // Trigger after 400ms hold
            });

            btn.addEventListener('touchend', () => {
                clearTimeout(timer);
                btn.classList.remove('haptic-pop');
            });

            btn.addEventListener('touchcancel', () => {
                clearTimeout(timer);
                btn.classList.remove('haptic-pop');
            });
        });
    });

    function init() {
        const now = new Date();
        const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
        document.getElementById('display-month').innerText = monthNames[now.getMonth()] + " " + now.getFullYear();
        
        const foods = ["Biryani", "Burger", "Shake", "Chaat", "Pizza", "Tea", "Drink", "Others"];
        document.getElementById('food-grid').innerHTML = foods.map(f => `<button class="pill-btn haptic" onclick="prepEntry('Expense', '${f}', 'Note?')">${f}</button>`).join('');
        refreshData();
    }

    function refreshData() {
        const now = new Date();
        const currentKey = `${now.getMonth() + 1}-${now.getFullYear()}`;
        let mIn = 0, mEx = 0;
        transactions.forEach(t => {
            if (t.monthYear === currentKey) {
                if (t.type === 'Income') mIn += parseFloat(t.amount);
                else mEx += parseFloat(t.amount);
            }
        });
        const bal = mIn - mEx;
        document.getElementById('display-wallet').innerText = "PKR " + bal.toLocaleString();
        document.getElementById('display-wallet').style.color = bal >= 0 ? "var(--ios-green)" : "var(--ios-red)";
        document.getElementById('stat-inc').innerText = "+" + mIn.toLocaleString();
        document.getElementById('stat-exp').innerText = "-" + mEx.toLocaleString();

        const sorted = [...transactions].sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
        document.getElementById('history-list').innerHTML = sorted.map(t => `
            <div class="history-item">
                <div><div style="font-weight:700;">${t.subCat}</div><div style="font-size:10px; color:var(--text-dim);">${t.date}</div></div>
                <div style="text-align:right;"><div style="font-weight:800; color:${t.type==='Income'?'var(--ios-green)':'var(--ios-red)'}">${t.type==='Income'?'+':'-'}${parseFloat(t.amount).toLocaleString()}</div><div style="font-size:10px; color:var(--text-dim);">${t.detail||''}</div></div>
            </div>
        `).join('') || '<div style="text-align:center; color:var(--text-dim); margin-top:30px;">Empty History</div>';

        localStorage.setItem('ios_haptic_logs', JSON.stringify(transactions));
    }

    function showView(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById('view-' + id).classList.add('active');
    }

    function prepEntry(cat, sub) {
        activeCat = cat; activeSub = sub; activeType = cat;
        document.getElementById('entry-title').innerText = sub;
        document.getElementById('input-amount').value = "";
        document.getElementById('input-desc').value = "";
        showView('entry');
    }

    function saveEntry() {
        const amt = document.getElementById('input-amount').value;
        if (!amt || amt <= 0) return;
        const now = new Date();
        transactions.push({
            timestamp: now.toISOString(),
            date: `${now.getDate()}/${now.getMonth() + 1} ${now.getHours()}:${now.getMinutes().toString().padStart(2, '0')}`,
            subCat: activeSub,
            detail: document.getElementById('input-desc').value,
            amount: amt,
            type: activeType,
            monthYear: `${now.getMonth() + 1}-${now.getFullYear()}`
        });
        refreshData();
        showView('dashboard');
    }

    function exportPreviousMonth() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const now = new Date();
        let m = now.getMonth(); let y = now.getFullYear();
        if (m === 0) { m = 12; y--; }
        const key = `${m}-${y}`;
        const data = transactions.filter(t => t.monthYear === key);
        if (!data.length) return alert("No data found");
        doc.text(`Report: ${key}`, 14, 20);
        doc.autoTable({ head: [['Date', 'Type', 'Amount']], body: data.map(t => [t.date, t.subCat, t.amount]) });
        doc.save(`Expenses_${key}.pdf`);
    }

    function backupJSON() {
        const blob = new Blob([JSON.stringify(transactions)], {type: 'application/json'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `Backup_${new Date().toLocaleDateString()}.json`;
        a.click();
    }

    init();
</script>
</body>
</html>
